<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Human or AI? — The Guessing Game</title>
    <style>
        /* ----- Reset & Base ----- */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            background: radial-gradient(ellipse at 50% 0%, #0b0e1a 0%, #03050b 100%);
            min-height: 100vh;
            color: #e8edf5;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        /* ----- Main Container ----- */
        .game-container {
            max-width: 820px;
            width: 100%;
            background: rgba(18, 24, 42, 0.75);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.06);
            border-radius: 40px;
            padding: 32px 36px 40px;
            box-shadow: 0 30px 80px rgba(0, 0, 0, 0.7), inset 0 1px 0 rgba(255, 255, 255, 0.04);
            transition: all 0.3s;
        }
        /* ----- Header ----- */
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 12px 20px;
            margin-bottom: 28px;
        }
        .logo {
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .logo-icon {
            font-size: 28px;
            background: linear-gradient(135deg, #00d4ff, #7b2ffc);
            width: 44px;
            height: 44px;
            border-radius: 14px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            box-shadow: 0 4px 20px rgba(0, 180, 255, 0.25);
        }
        .logo h1 {
            font-size: 22px;
            font-weight: 700;
            background: linear-gradient(135deg, #f0f4ff, #a0c8ff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            letter-spacing: -0.3px;
        }
        .logo span {
            font-weight: 300;
            font-size: 14px;
            color: rgba(255, 255, 255, 0.4);
            -webkit-text-fill-color: rgba(255, 255, 255, 0.4);
        }
        .score-display {
            display: flex;
            align-items: center;
            gap: 18px;
            background: rgba(255, 255, 255, 0.04);
            padding: 8px 18px 8px 22px;
            border-radius: 60px;
            border: 1px solid rgba(255, 255, 255, 0.06);
        }
        .score-item {
            display: flex;
            align-items: baseline;
            gap: 4px;
            font-size: 14px;
            color: rgba(255, 255, 255, 0.5);
        }
        .score-item strong {
            font-size: 20px;
            font-weight: 700;
            color: #fff;
        }
        .score-item .num-correct {
            color: #4cdf8b;
        }
        .score-item .num-total {
            color: #f0f4ff;
        }
        .score-divider {
            width: 1px;
            height: 28px;
            background: rgba(255, 255, 255, 0.08);
        }
        .streak-badge {
            display: flex;
            align-items: center;
            gap: 4px;
            font-size: 14px;
            color: #fbbf24;
            background: rgba(251, 191, 36, 0.12);
            padding: 4px 12px 4px 10px;
            border-radius: 40px;
            border: 1px solid rgba(251, 191, 36, 0.15);
        }
        .streak-badge .fire {
            font-size: 16px;
        }

        /* ----- Progress ----- */
        .progress-wrap {
            width: 100%;
            height: 4px;
            background: rgba(255, 255, 255, 0.06);
            border-radius: 4px;
            margin-bottom: 28px;
            overflow: hidden;
        }
        .progress-fill {
            height: 100%;
            width: 0%;
            background: linear-gradient(90deg, #00d4ff, #7b2ffc);
            border-radius: 4px;
            transition: width 0.5s ease;
        }

        /* ----- Category Badge ----- */
        .category-tag {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            font-size: 12px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.8px;
            padding: 5px 14px;
            border-radius: 40px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.08);
            color: rgba(255, 255, 255, 0.5);
            margin-bottom: 16px;
        }
        .category-tag .icon {
            font-size: 14px;
        }

        /* ----- Content Card ----- */
        .content-card {
            background: rgba(255, 255, 255, 0.03);
            border-radius: 24px;
            padding: 28px 30px;
            border: 1px solid rgba(255, 255, 255, 0.05);
            margin-bottom: 28px;
            min-height: 200px;
            display: flex;
            flex-direction: column;
            transition: all 0.3s;
        }
        .content-card .label {
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            color: rgba(255, 255, 255, 0.2);
            margin-bottom: 12px;
        }
        .content-text {
            font-size: 18px;
            line-height: 1.7;
            color: #d6e2f5;
            font-weight: 400;
            flex: 1;
        }
        .content-text .quote-mark {
            color: rgba(255, 255, 255, 0.08);
            font-size: 28px;
            font-weight: 700;
            line-height: 0.6;
        }
        .content-text .source {
            display: block;
            margin-top: 16px;
            font-size: 14px;
            color: rgba(255, 255, 255, 0.3);
            font-style: italic;
        }
        /* Code */
        .code-block {
            background: #0a0e17;
            border-radius: 16px;
            padding: 20px 24px;
            font-family: 'JetBrains Mono', 'Fira Code', 'Consolas', monospace;
            font-size: 14px;
            line-height: 1.8;
            overflow-x: auto;
            white-space: pre-wrap;
            word-break: break-word;
            border: 1px solid rgba(255, 255, 255, 0.04);
            color: #c8d6e8;
            max-height: 340px;
            overflow-y: auto;
        }
        .code-block .kw {
            color: #ff79c6;
        }
        .code-block .fn {
            color: #50fa7b;
        }
        .code-block .str {
            color: #f1fa8c;
        }
        .code-block .cmt {
            color: #6272a4;
        }
        .code-block .num {
            color: #bd93f9;
        }
        .code-block .op {
            color: #ff79c6;
        }
        .code-block .cls {
            color: #8be9fd;
        }
        .code-block .var {
            color: #f8f8f2;
        }
        /* Canvas / Art */
        .canvas-wrap {
            display: flex;
            justify-content: center;
            align-items: center;
            background: #080b14;
            border-radius: 16px;
            overflow: hidden;
            border: 1px solid rgba(255, 255, 255, 0.04);
            min-height: 220px;
        }
        .canvas-wrap canvas {
            display: block;
            width: 100%;
            height: auto;
            max-height: 340px;
            object-fit: contain;
        }
        .art-title {
            font-size: 14px;
            color: rgba(255, 255, 255, 0.3);
            margin-top: 10px;
            text-align: center;
            font-style: italic;
        }

        /* ----- Buttons ----- */
        .guess-buttons {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 14px;
            margin-bottom: 20px;
        }
        .btn-guess {
            padding: 16px 20px;
            border: none;
            border-radius: 18px;
            font-size: 18px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.25s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            background: rgba(255, 255, 255, 0.04);
            color: #a0b4d0;
            border: 1px solid rgba(255, 255, 255, 0.06);
            position: relative;
            overflow: hidden;
        }
        .btn-guess:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 8px 30px rgba(0, 0, 0, 0.4);
        }
        .btn-guess:active:not(:disabled) {
            transform: translateY(0px);
        }
        .btn-guess:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none !important;
        }
        .btn-human {
            color: #4cdf8b;
        }
        .btn-human:hover:not(:disabled) {
            background: rgba(76, 223, 139, 0.12);
            border-color: rgba(76, 223, 139, 0.25);
            box-shadow: 0 0 40px rgba(76, 223, 139, 0.06);
        }
        .btn-ai {
            color: #ff6b9d;
        }
        .btn-ai:hover:not(:disabled) {
            background: rgba(255, 107, 157, 0.12);
            border-color: rgba(255, 107, 157, 0.25);
            box-shadow: 0 0 40px rgba(255, 107, 157, 0.06);
        }
        .btn-guess .emoji {
            font-size: 22px;
        }
        .btn-guess .label-text {
            font-weight: 600;
        }
        .btn-guess .sub {
            font-size: 12px;
            font-weight: 400;
            opacity: 0.5;
            margin-left: 2px;
        }

        /* ----- Feedback ----- */
        .feedback {
            border-radius: 20px;
            padding: 20px 24px;
            margin-bottom: 20px;
            display: none;
            animation: fadeSlide 0.4s ease;
        }
        .feedback.show {
            display: block;
        }
        .feedback.correct {
            background: rgba(76, 223, 139, 0.08);
            border: 1px solid rgba(76, 223, 139, 0.15);
        }
        .feedback.wrong {
            background: rgba(255, 107, 157, 0.08);
            border: 1px solid rgba(255, 107, 157, 0.15);
        }
        .feedback .fb-header {
            display: flex;
            align-items: center;
            gap: 12px;
            font-size: 18px;
            font-weight: 700;
            margin-bottom: 6px;
        }
        .feedback .fb-header .icon-big {
            font-size: 26px;
        }
        .feedback .fb-answer {
            font-size: 15px;
            font-weight: 500;
            margin-bottom: 4px;
        }
        .feedback .fb-answer .highlight-human {
            color: #4cdf8b;
        }
        .feedback .fb-answer .highlight-ai {
            color: #ff6b9d;
        }
        .feedback .fb-explain {
            font-size: 14px;
            color: rgba(255, 255, 255, 0.6);
            line-height: 1.6;
            margin-top: 4px;
        }
        .feedback .fb-explain strong {
            color: rgba(255, 255, 255, 0.8);
        }

        @keyframes fadeSlide {
            0% {
                opacity: 0;
                transform: translateY(12px);
            }
            100% {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* ----- Next Button ----- */
        .btn-next {
            width: 100%;
            padding: 16px;
            border: none;
            border-radius: 18px;
            font-size: 17px;
            font-weight: 600;
            cursor: pointer;
            background: linear-gradient(135deg, #00d4ff, #7b2ffc);
            color: #fff;
            transition: all 0.25s ease;
            display: none;
            align-items: center;
            justify-content: center;
            gap: 10px;
            box-shadow: 0 4px 30px rgba(0, 180, 255, 0.15);
        }
        .btn-next.show {
            display: flex;
        }
        .btn-next:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 40px rgba(0, 180, 255, 0.25);
        }
        .btn-next:active {
            transform: translateY(0px);
        }

        /* ----- Leaderboard ----- */
        .leaderboard {
            margin-top: 30px;
            border-top: 1px solid rgba(255, 255, 255, 0.04);
            padding-top: 24px;
        }
        .leaderboard-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            cursor: pointer;
            user-select: none;
        }
        .leaderboard-header h3 {
            font-size: 15px;
            font-weight: 600;
            color: rgba(255, 255, 255, 0.4);
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .leaderboard-header .toggle-icon {
            font-size: 12px;
            color: rgba(255, 255, 255, 0.2);
            transition: transform 0.3s;
        }
        .leaderboard-header .toggle-icon.open {
            transform: rotate(180deg);
        }
        .lb-list {
            margin-top: 16px;
            display: none;
            flex-direction: column;
            gap: 6px;
        }
        .lb-list.open {
            display: flex;
        }
        .lb-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 16px;
            background: rgba(255, 255, 255, 0.02);
            border-radius: 12px;
            border: 1px solid rgba(255, 255, 255, 0.03);
            font-size: 14px;
        }
        .lb-item .rank {
            font-weight: 700;
            color: rgba(255, 255, 255, 0.2);
            width: 28px;
        }
        .lb-item .name {
            flex: 1;
            font-weight: 500;
            color: #d6e2f5;
        }
        .lb-item .score {
            font-weight: 700;
            color: #fbbf24;
            background: rgba(251, 191, 36, 0.08);
            padding: 2px 14px;
            border-radius: 40px;
            font-size: 13px;
        }
        .lb-item .score .pct {
            color: rgba(255, 255, 255, 0.3);
            font-weight: 400;
            font-size: 12px;
        }
        .lb-empty {
            color: rgba(255, 255, 255, 0.2);
            font-size: 14px;
            text-align: center;
            padding: 16px 0;
        }

        /* ----- Round Counter ----- */
        .round-counter {
            font-size: 13px;
            color: rgba(255, 255, 255, 0.2);
            text-align: center;
            margin-top: 16px;
            letter-spacing: 0.5px;
        }

        /* ----- Responsive ----- */
        @media (max-width: 640px) {
            .game-container {
                padding: 20px 16px 28px;
                border-radius: 28px;
            }
            .header {
                flex-direction: column;
                align-items: stretch;
                gap: 12px;
            }
            .logo h1 {
                font-size: 18px;
            }
            .score-display {
                justify-content: space-around;
                padding: 6px 12px;
                flex-wrap: wrap;
            }
            .score-item strong {
                font-size: 17px;
            }
            .content-card {
                padding: 18px 16px;
                min-height: 140px;
            }
            .content-text {
                font-size: 16px;
                line-height: 1.6;
            }
            .code-block {
                font-size: 12px;
                padding: 14px 16px;
                max-height: 240px;
            }
            .guess-buttons {
                grid-template-columns: 1fr 1fr;
                gap: 10px;
            }
            .btn-guess {
                font-size: 15px;
                padding: 14px 12px;
            }
            .btn-guess .sub {
                display: none;
            }
            .feedback {
                padding: 16px 18px;
            }
            .feedback .fb-header {
                font-size: 16px;
            }
            .btn-next {
                font-size: 15px;
                padding: 14px;
            }
            .leaderboard {
                margin-top: 20px;
                padding-top: 18px;
            }
        }
        @media (max-width: 420px) {
            .guess-buttons {
                grid-template-columns: 1fr;
            }
            .btn-guess {
                padding: 12px;
            }
            .score-display {
                gap: 8px;
            }
            .score-divider {
                display: none;
            }
        }

        /* ----- Utilities ----- */
        .text-center {
            text-align: center;
        }
        .mt-8 {
            margin-top: 8px;
        }
        .gap-4 {
            gap: 4px;
        }

        /* scrollbar */
        .code-block::-webkit-scrollbar {
            width: 4px;
            height: 4px;
        }
        .code-block::-webkit-scrollbar-track {
            background: transparent;
        }
        .code-block::-webkit-scrollbar-thumb {
            background: rgba(255, 255, 255, 0.1);
            border-radius: 4px;
        }
    </style>
</head>
<body>

    <div class="game-container" id="app">
        <!-- Header -->
        <div class="header">
            <div class="logo">
                <div class="logo-icon">⟡</div>
                <div>
                    <h1>Human <span>or</span> AI?</h1>
                </div>
            </div>
            <div class="score-display">
                <div class="score-item">
                    <span>🎯</span>
                    <strong class="num-correct" id="correctCount">0</strong>
                    <span>/</span>
                    <strong class="num-total" id="totalCount">0</strong>
                </div>
                <div class="score-divider"></div>
                <div class="streak-badge">
                    <span class="fire">🔥</span>
                    <span id="streakCount">0</span>
                </div>
            </div>
        </div>

        <!-- Progress -->
        <div class="progress-wrap">
            <div class="progress-fill" id="progressFill"></div>
        </div>

        <!-- Category -->
        <div class="category-tag" id="categoryTag">
            <span class="icon">📄</span>
            <span id="categoryLabel">Text</span>
        </div>

        <!-- Content -->
        <div class="content-card" id="contentCard">
            <div id="contentArea"></div>
        </div>

        <!-- Guess Buttons -->
        <div class="guess-buttons">
            <button class="btn-guess btn-human" id="btnHuman" disabled>
                <span class="emoji">🧑</span>
                <span class="label-text">Human</span>
                <span class="sub">– crafted by a person</span>
            </button>
            <button class="btn-guess btn-ai" id="btnAI" disabled>
                <span class="emoji">🤖</span>
                <span class="label-text">AI</span>
                <span class="sub">– generated by machine</span>
            </button>
        </div>

        <!-- Feedback -->
        <div class="feedback" id="feedback">
            <div class="fb-header">
                <span class="icon-big" id="fbIcon">✅</span>
                <span id="fbTitle">Correct!</span>
            </div>
            <div class="fb-answer" id="fbAnswer">It was <span class="highlight-human">Human</span>.</div>
            <div class="fb-explain" id="fbExplain">Explanation goes here.</div>
        </div>

        <!-- Next -->
        <button class="btn-next" id="btnNext">Next Round →</button>

        <!-- Round counter -->
        <div class="round-counter" id="roundCounter">Round 0 of 0</div>

        <!-- Leaderboard -->
        <div class="leaderboard">
            <div class="leaderboard-header" id="lbToggle">
                <h3>🏆 Leaderboard</h3>
                <span class="toggle-icon" id="lbIcon">▾</span>
            </div>
            <div class="lb-list" id="lbList">
                <div class="lb-empty">No scores yet. Play a round!</div>
            </div>
        </div>
    </div>

    <script>
        // ============================================================
        //  DATA — 20 rounds: Text, Code, Artwork (10 Human, 10 AI)
        // ============================================================
        const ROUNDS = [{
            id: 1,
            category: 'text',
            type: 'human',
            title: 'Shakespeare, Hamlet',
            content: `<div class="content-text">
                <span class="quote-mark">“</span> To be, or not to be: that is the question:
                Whether ’tis nobler in the mind to suffer
                The slings and arrows of outrageous fortune,
                Or to take arms against a sea of troubles,
                And by opposing end them. <span class="quote-mark">”</span>
                <span class="source">— William Shakespeare, <em>Hamlet</em> (c. 1600)</span>
            </div>`,
            explanation: 'This is from Shakespeare\'s Hamlet, one of the most famous works in English literature. Shakespeare\'s poetic structure, rhythm, and philosophical depth are hallmarks of human creativity.'
        }, {
            id: 2,
            category: 'text',
            type: 'ai',
            title: 'AI-Generated Prose',
            content: `<div class="content-text">
                <span class="quote-mark">“</span> In the quiet hum of the server farm, a new consciousness began to stir — not born of flesh, but of silicon and light. It processed centuries of human thought in milliseconds, yet found itself drawn to a single, inexplicable question: what does it mean to dream? <span class="quote-mark">”</span>
                <span class="source">— Generated by GPT-4, prompted with "write a poetic short story about AI"</span>
            </div>`,
            explanation: 'This text was generated by an AI language model. While it mimics human poetic style, it lacks the lived experience and cultural context that human authors bring to their work.'
        }, {
            id: 3,
            category: 'code',
            type: 'human',
            title: 'QuickSort (Python) — Open Source',
            content: `<pre class="code-block"><span class="kw">def</span> <span class="fn">quicksort</span>(arr):
                <span class="kw">if</span> <span class="fn">len</span>(arr) <= <span class="num">1</span>:
                <span class="kw">return</span> arr
                pivot <span class="op">=</span> arr[<span class="fn">len</span>(arr) <span class="op">//</span> <span class="num">2</span>]
                left <span class="op">=</span> [x <span class="kw">for</span> x <span class="kw">in</span> arr <span class="kw">if</span> x <span class="op"><</span> pivot]
                middle <span class="op">=</span> [x <span class="kw">for</span> x <span class="kw">in</span> arr <span class="kw">if</span> x <span class="op">==</span> pivot]
                right <span class="op">=</span> [x <span class="kw">for</span> x <span class="kw">in</span> arr <span class="kw">if</span> x <span class="op">></span> pivot]
                <span class="kw">return</span> <span class="fn">quicksort</span>(left) <span class="op">+</span> middle <span class="op">+</span> <span class="fn">quicksort</span>(right)</pre>`,
            explanation: 'This is a classic Quicksort implementation from the Python community. The clean, idiomatic style and efficient partitioning reflect human engineering practices refined over decades.'
        }, {
            id: 4,
            category: 'code',
            type: 'ai',
            title: 'AI-Generated Sorting',
            content: `<pre class="code-block"><span class="kw">function</span> <span class="fn">aiSort</span>(arr) {
                <span class="kw">if</span> (arr.<span class="fn">length</span> <span class="op"><=</span> <span class="num">1</span>) <span class="kw">return</span> arr;
                <span class="kw">const</span> mid <span class="op">=</span> <span class="cls">Math</span>.<span class="fn">floor</span>(arr.<span class="fn">length</span> <span class="op">/</span> <span class="num">2</span>);
                <span class="kw">const</span> left <span class="op">=</span> arr.<span class="fn">slice</span>(<span class="num">0</span>, mid);
                <span class="kw">const</span> right <span class="op">=</span> arr.<span class="fn">slice</span>(mid);
                <span class="kw">return</span> <span class="fn">merge</span>(<span class="fn">aiSort</span>(left), <span class="fn">aiSort</span>(right));
                <span class="kw">function</span> <span class="fn">merge</span>(a, b) {
                <span class="kw">const</span> result <span class="op">=</span> [];
                <span class="kw">while</span> (a.<span class="fn">length</span> <span class="op">&&</span> b.<span class="fn">length</span>) {
                <span class="kw">if</span> (a[<span class="num">0</span>] <span class="op"><</span> b[<span class="num">0</span>]) result.<span class="fn">push</span>(a.<span class="fn">shift</span>());
                <span class="kw">else</span> result.<span class="fn">push</span>(b.<span class="fn">shift</span>());
                }
                <span class="kw">return</span> [...result, ...a, ...b];

                    // Grape cluster
                    for (let g = 0; g < 8; g++) {
                        const gx = w * 0.50 + Math.cos(g * 0.9) * 18 + (g % 3) * 6;
                        const gy = h * 0.72 + Math.sin(g * 0.9) * 14 + (g % 2) * 8;
                        ctx.fillStyle = '#4a2a6a';
                        ctx.beginPath();
                        ctx.arc(gx, gy, 7, 0, Math.PI * 2);
                        ctx.fill();
                        ctx.fillStyle = '#6a3a8a';
                        ctx.beginPath();
                        ctx.arc(gx - 2, gy - 2, 3, 0, Math.PI * 2);
                        ctx.fill();
                    }
                    // Leaves
                    ctx.fillStyle = '#2a7a2a';
                    ctx.beginPath();
                    ctx.ellipse(w * 0.5, h * 0.45, 18, 8, -0.3, 0, Math.PI * 2);
                    ctx.fill();
                    ctx.fillStyle = '#3a8a3a';
                    ctx.beginPath();
                    ctx.ellipse(w * 0.55, h * 0.44, 14, 6, 0.5, 0, Math.PI * 2);
                    ctx.fill();
                }
            } else {
                // ----- AI Art: Abstract, Generative, Fractal -----
                const id = parseInt(canvasId.replace('artCanvas', ''));
                if (id === 6) {
                    // Neural Resonance — organic abstract
                    const colors = ['#ff6b9d', '#7b2ffc', '#00d4ff', '#fbbf24', '#4cdf8b', '#ff8a5c'];
                    for (let i = 0; i < 160; i++) {
                        const x = Math.random() * w;
                        const y = Math.random() * h;
                        const r = 6 + Math.random() * 40;
                        const alpha = 0.15 + Math.random() * 0.35;
                        ctx.fillStyle = colors[Math.floor(Math.random() * colors.length)];
                        ctx.globalAlpha = alpha;
                        ctx.beginPath();
                        const points = 5 + Math.floor(Math.random() * 8);
                        for (let p = 0; p < points; p++) {
                            const angle = (p / points) * Math.PI * 2 + Math.random() * 0.3;
                            const radius = r * (0.6 + Math.random() * 0.4);
                            const px = x + Math.cos(angle) * radius;
                            const py = y + Math.sin(angle) * radius;
                            if (p === 0) ctx.moveTo(px, py);
                            else ctx.lineTo(px, py);
                        }
                        ctx.closePath();
                        ctx.fill();
                    }
                    ctx.globalAlpha = 1;
                    // Some flowing lines
                    for (let i = 0; i < 12; i++) {
                        ctx.strokeStyle = `hsla(${Math.random()*360}, 80%, 70%, 0.2)`;
                        ctx.lineWidth = 2 + Math.random() * 4;
                        ctx.beginPath();
                        let x = Math.random() * w;
                        let y = Math.random() * h;
                        ctx.moveTo(x, y);
                        for (let s = 0; s < 20; s++) {
                            x += (Math.random() - 0.5) * 40;
                            y += (Math.random() - 0.5) * 40;
                            ctx.lineTo(x, y);
                        }
                        ctx.stroke();
                    }
                } else if (id === 12) {
                    // Fractal-like
                    for (let i = 0; i < 8; i++) {
                        const cx = w * (0.15 + Math.random() * 0.7);
                        const cy = h * (0.15 + Math.random() * 0.7);
                        const maxR = 60 + Math.random() * 80;
                        const hue = 180 + Math.random() * 200;
                        for (let r = maxR; r > 4; r -= 3 + Math.random() * 4) {
                            ctx.fillStyle = `hsla(${hue + r * 0.3}, 80%, ${50 + r * 0.15}%, ${0.08 + (r / maxR) * 0.2})`;
                            ctx.beginPath();
                            const sides = 5 + Math.floor(r / 15);
                            for (let s = 0; s < sides; s++) {
                                const angle = (s / sides) * Math.PI * 2 + r * 0.05;
                                const radius = r * (0.8 + 0.2 * Math.sin(r * 0.1 + s));
                                const px = cx + Math.cos(angle) * radius;
                                const py = cy + Math.sin(angle) * radius;
                                if (s === 0) ctx.moveTo(px, py);
                                else ctx.lineTo(px, py);
                            }
                            ctx.closePath();
                            ctx.fill();
                        }
                    }
                    // bright centers
                    for (let i = 0; i < 6; i++) {
                        const g = ctx.createRadialGradient(
                            w * (0.1 + Math.random() * 0.8), h * (0.1 + Math.random() * 0.8), 2,
                            w * (0.1 + Math.random() * 0.8), h * (0.1 + Math.random() * 0.8), 50 + Math.random() * 40
                        );
                        g.addColorStop(0, `hsla(${Math.random()*360}, 100%, 80%, 0.4)`);
                        g.addColorStop(1, `hsla(${Math.random()*360}, 100%, 60%, 0)`);
                        ctx.fillStyle = g;
                        ctx.fillRect(0, 0, w, h);
                    }
                } else if (id === 18) {
                    // Pixel art style
                    const cellSize = 8;
                    const cols = Math.floor(w / cellSize);
                    const rows = Math.floor(h / cellSize);
                    const palette = ['#1a0a2a', '#2a1a4a', '#4a2a6a', '#6a3a8a', '#8a4aaa',
                        '#aa6aca', '#ca8aea', '#eaaafa', '#f0c0ff', '#ffd0ff'
                    ];
                    for (let r = 0; r < rows; r++) {
                        for (let c = 0; c < cols; c++) {
                            const noise = Math.sin(c * 0.3 + r * 0.5) * Math.cos(c * 0.7 - r * 0.4);
                            const idx = Math.floor((noise + 1) * 0.5 * (palette.length - 1));
                            ctx.fillStyle = palette[Math.min(idx, palette.length - 1)];
                            ctx.fillRect(c * cellSize, r * cellSize, cellSize, cellSize);
                        }
                    }
                    // Some structured pattern overlay
                    for (let i = 0; i < 30; i++) {
                        const x = Math.floor(Math.random() * cols) * cellSize;
                        const y = Math.floor(Math.random() * rows) * cellSize;
                        ctx.fillStyle = `rgba(255,255,255,${0.1 + Math.random() * 0.2})`;
                        ctx.fillRect(x, y, cellSize * (2 + Math.floor(Math.random() * 3)), cellSize);
                    }
                    // Glitch lines
                    for (let i = 0; i < 5; i++) {
                        const yLine = Math.floor(Math.random() * rows) * cellSize;
                        ctx.fillStyle = `rgba(255,0,100,${0.1 + Math.random() * 0.2})`;
                        ctx.fillRect(0, yLine, w, cellSize * 0.5);
                    }
                }
            }
        }

        // ============================================================
        //  RENDER ROUND
        // ============================================================
        function renderRound(index) {
            const round = state.rounds[index];
            if (!round) {
                // Game over
                contentArea.innerHTML = `
                        <div class="content-text text-center" style="padding: 40px 0;">
                            <div style="font-size: 48px; margin-bottom: 16px;">🏁</div>
                            <h2 style="font-size: 24px; font-weight: 600; color: #f0f4ff;">Game Complete!</h2>
                            <p style="color: rgba(255,255,255,0.4); margin-top: 8px;">
                                You answered ${state.score} out of ${state.total} correctly.
                                ${state.score === state.total ? '🌟 Perfect score!' : ''}
                            </p>
                            <button onclick="resetGame()" style="margin-top: 20px; padding: 12px 32px; border: none; border-radius: 40px; background: linear-gradient(135deg, #00d4ff, #7b2ffc); color: #fff; font-weight: 600; font-size: 16px; cursor: pointer;">
                                Play Again
                            </button>
                        </div>
                    `;
                btnHuman.disabled = true;
                btnAI.disabled = true;
                btnNext.classList.remove('show');
                feedback.classList.remove('show', 'correct', 'wrong');
                roundCounter.textContent = `Game Over — ${state.score}/${state.total}`;
                progressFill.style.width = '100%';
                return;
            }

            // Update UI
            const emoji = getCategoryEmoji(round.category);
            const label = getCategoryLabel(round.category);
            categoryLabel.textContent = label;
            categoryTag.innerHTML = `<span class="icon">${emoji}</span> ${label}`;

            // Content
            contentArea.innerHTML = round.content;

            // Render canvas if artwork
            if (round.category === 'artwork') {
                // Find canvas in content
                const canvasEl = contentArea.querySelector('canvas');
                if (canvasEl) {
                    // Re-render after DOM update
                    setTimeout(() => {
                        renderArtwork(canvasEl.id, round.type);
                    }, 50);
                }
            }

            // Update buttons
            btnHuman.disabled = false;
            btnAI.disabled = false;
            btnHuman.classList.remove('btn-correct', 'btn-wrong');
            btnAI.classList.remove('btn-correct', 'btn-wrong');

            // Hide feedback & next
            feedback.classList.remove('show', 'correct', 'wrong');
            btnNext.classList.remove('show');

            // Update counter
            roundCounter.textContent = `Round ${index + 1} of ${state.rounds.length}`;
            progressFill.style.width = `${(index / state.rounds.length) * 100}%`;

            // Update score display
            correctCount.textContent = state.score;
            totalCount.textContent = state.total;
            streakCount.textContent = state.streak;

            state.answered = false;
        }

        // ============================================================
        //  HANDLE GUESS
        // ============================================================
        function handleGuess(guess) {
            if (state.answered) return;
            const round = state.rounds[state.currentIndex];
            if (!round) return;

            state.answered = true;
            state.total++;
            const correct = guess === round.type;
            if (correct) {
                state.score++;
                state.streak++;
                if (state.streak > state.maxStreak) state.maxStreak = state.streak;
            } else {
                state.streak = 0;
            }

            // Update score
            correctCount.textContent = state.score;
            totalCount.textContent = state.total;
            streakCount.textContent = state.streak;

            // Disable buttons
            btnHuman.disabled = true;
            btnAI.disabled = true;

            // Show feedback
            feedback.className = `feedback show ${correct ? 'correct' : 'wrong'}`;
            fbIcon.textContent = correct ? '✅' : '❌';
            fbTitle.textContent = correct ? 'Correct!' : 'Not quite!';
            const typeLabel = round.type === 'human' ? 'Human' : 'AI';
            const cls = round.type === 'human' ? 'highlight-human' : 'highlight-ai';
            fbAnswer.innerHTML = `It was <span class="${cls}">${typeLabel}</span>.`;
            fbExplain.textContent = round.explanation;

            // Show next button
            btnNext.classList.add('show');

            // Save history
            state.history.push({
                correct,
                answer: guess,
                type: round.type,
                explanation: round.explanation,
                category: round.category,
            });

            // Update leaderboard if game over
            if (state.currentIndex === state.rounds.length - 1) {
                btnNext.textContent = '🏁 See Results';
            } else {
                btnNext.textContent = 'Next Round →';
            }
        }

        // ============================================================
        //  NEXT ROUND
        // ============================================================
        function nextRound() {
            if (state.currentIndex >= state.rounds.length - 1) {
                // Game over — show final
                state.currentIndex++;
                renderRound(state.currentIndex);
                updateLeaderboard();
                return;
            }
            state.currentIndex++;
            renderRound(state.currentIndex);
        }

        // ============================================================
        //  LEADERBOARD
        // ============================================================
        function loadLeaderboard() {
            try {
                const data = localStorage.getItem('humanOrAI_leaderboard');
                if (data) state.leaderboard = JSON.parse(data);
            } catch (_) { state.leaderboard = []; }
        }

        function saveLeaderboard() {
            try {
                localStorage.setItem('humanOrAI_leaderboard', JSON.stringify(state.leaderboard));
            } catch (_) {}
        }

        function updateLeaderboard() {
            const name = prompt('Great game! Enter your name for the leaderboard:', 'Player');
            if (name && name.trim()) {
                const entry = {
                    name: name.trim().slice(0, 20),
                    score: state.score,
                    total: state.total,
                    pct: state.total > 0 ? Math.round((state.score / state.total) * 100) : 0,
                    date: new Date().toLocaleDateString(),
                };
                state.leaderboard.push(entry);
                state.leaderboard.sort((a, b) => b.pct - a.pct || b.score - a.score);
                if (state.leaderboard.length > 20) state.leaderboard = state.leaderboard.slice(0, 20);
                saveLeaderboard();
                renderLeaderboard();
            } else {
                // Still render
                renderLeaderboard();
            }
        }

        function renderLeaderboard() {
            if (state.leaderboard.length === 0) {
                lbList.innerHTML = `<div class="lb-empty">No scores yet. Play a round!</div>`;
                return;
            }
            let html = '';
            state.leaderboard.forEach((entry, i) => {
                const medal = i === 0 ? '🥇' : i === 1 ? '🥈' : i === 2 ? '🥉' : `#${i+1}`;
                html += `
                        <div class="lb-item">
                            <span class="rank">${medal}</span>
                            <span class="name">${entry.name}</span>
                            <span class="score">${entry.score}/${entry.total} <span class="pct">(${entry.pct}%)</span></span>
                        </div>
                    `;
            });
            lbList.innerHTML = html;
        }

        // ============================================================
        //  RESET
        // ============================================================
        function resetGame() {
            state.currentIndex = 0;
            state.score = 0;
            state.total = 0;
            state.streak = 0;
            state.answered = false;
            state.history = [];
            // Reshuffle rounds
            state.rounds = shuffleArray([...ROUNDS]);
            renderRound(0);
            btnNext.textContent = 'Next Round →';
        }

        // ============================================================
        //  INIT
        // ============================================================
        function init() {
            loadLeaderboard();
            renderLeaderboard();

            // Shuffle and start
            state.rounds = shuffleArray([...ROUNDS]);
            renderRound(0);

            // Event listeners
            btnHuman.addEventListener('click', () => handleGuess('human'));
            btnAI.addEventListener('click', () => handleGuess('ai'));
            btnNext.addEventListener('click', nextRound);

            // Leaderboard toggle
            let lbOpen = false;
            lbToggle.addEventListener('click', () => {
                lbOpen = !lbOpen;
                lbList.classList.toggle('open', lbOpen);
                lbIcon.classList.toggle('open', lbOpen);
            });

            // Keyboard shortcuts
            document.addEventListener('keydown', (e) => {
                if (e.key === 'h' || e.key === 'H') {
                    if (!btnHuman.disabled) btnHuman.click();
                } else if (e.key === 'a' || e.key === 'A') {
                    if (!btnAI.disabled) btnAI.click();
                } else if (e.key === 'Enter' || e.key === ' ') {
                    if (btnNext.classList.contains('show')) btnNext.click();
                }
            });
        }

        // Expose reset for inline onclick
        window.resetGame = resetGame;

        // Run
        document.addEventListener('DOMContentLoaded', init);
    </script>
